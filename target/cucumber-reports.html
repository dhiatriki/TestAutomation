 entered\r\n    And a password \"correct\" is entered\r\n    And the login form is submitted\r\n    Then the welcome message should be displayed\r\n\r\n  Scenario Outline: Verify footer links redirection\r\n    Then the footer link \"<Link>\" should redirect to \"<Page>\"\r\n\r\n    Examples:\r\n      | Link           | Page    |\r\n      | Terms of Use   | Terms   |\r\n      | Privacy Policy | Privacy |","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:///C:/Users/lenovo/Documents/GitHub/TestAutomation/src/test/resources/features/01_login.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Login with language management and footer verification","description":"","children":[{"background":{"location":{"line":3,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":4,"column":5},"keyword":"Given ","keywordType":"Context","text":"the browser is launched","id":"5784b9ec-78f7-454f-a843-8fe7442c1cc0"},{"location":{"line":5,"column":5},"keyword":"When ","keywordType":"Action","text":"the login page is opened","id":"0505b961-58bf-4618-8f61-536e6e94bae2"}],"id":"b1c90532-5cf4-4c3f-a0b5-e858fdfd261a"}},{"scenario":{"location":{"line":8,"column":3},"tags":[],"keyword":"Scenario","name":"Verify the home block with image and logo","description":"","steps":[{"location":{"line":9,"column":5},"keyword":"When ","keywordType":"Action","text":"the login page is opened","id":"31e7b5e4-7612-48a2-a284-96099eb86930"},{"location":{"line":10,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"the home block with image should be visible","id":"00c0761e-3ae1-4eb7-97e3-d40c514c4a0e"},{"location":{"line":11,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the brand logo should be visible","id":"6277be8e-a88c-49cc-b3ba-b9e1e83ad734"}],"examples":[],"id":"f161a947-01e3-4b05-9dfc-88ad98649ea4"}},{"scenario":{"location":{"line":14,"column":3},"tags":[],"k
